services:
  postgres:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: gitbase
      POSTGRES_PASSWORD: gitbase
      POSTGRES_DB: gitbase
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitbase"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
