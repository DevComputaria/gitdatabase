repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt (rustfmt)
        entry: cargo fmt --all
        language: system
        pass_filenames: false
        stages: [commit, push]
      - id: cargo-clippy
        name: cargo clippy (deny warnings)
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        pass_filenames: false
        stages: [commit, push]
